<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <link id="favicon" rel="icon" href="data:," />
  <style>
    :root {
      --bg: #0a0c12;
      --card: rgba(22, 25, 36, 0.85);
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #8ab4f8;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(138, 180, 248, 0.08), transparent),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .card {
      width: min(520px, 88vw);
      padding: 38px 40px;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: pop 360ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes pop { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
    .fav-wrap {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .fav-wrap img { width: 40px; height: 40px; object-fit: contain; }
    .fav-fallback { font-size: 30px; }
    h1 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 10px;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .url {
      font-size: 12.5px;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .load-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      background: linear-gradient(135deg, var(--accent), #9eb8f5);
      color: #0a0c12;
      border: none;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(138, 180, 248, 0.3);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .load-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(138, 180, 248, 0.42); }
    .load-btn svg { width: 16px; height: 16px; }
    .hint {
      margin-top: 16px;
      font-size: 11.5px;
      color: var(--muted);
      opacity: 0.75;
    }
    .badge {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      font-size: 10.5px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(22, 25, 36, 0.7);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="badge">💤 Frozen tab · TabGroup Master</div>
  <div class="card" id="card">
    <div class="fav-wrap"><span class="fav-fallback" id="fav-fallback">🌐</span></div>
    <h1 id="title">Frozen tab</h1>
    <div class="url" id="url"></div>
    <button class="load-btn" id="load-btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Load this page
    </button>
    <div class="hint">Click anywhere — or just switch to this tab — to load it.</div>
  </div>
  <script src="suspended.js"></script>
</body>
</html>
